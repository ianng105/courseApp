spring.application.name=courseApp
server.servlet.context-path=/courseApp
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.tracking-modes=cookie
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=40MB
spring.servlet.multipart.file-size-threshold=5MB
spring.servlet.multipart.location=${java.io.tmpdir}


# H2 data source
spring.datasource.url=jdbc:h2:./Data/myDB;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=ian
spring.datasource.password=password
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Auto-initialize DB tables according to definition of entity classes
spring.jpa.hibernate.ddl-auto=update
# Show Hibernate-generated SQL in console & disable open-in-view, custom error page
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.web.error.whitelabel.enabled=false
spring.web.error.include-exception=true

server.port=8099